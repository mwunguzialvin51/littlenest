function wireAdminAppsReviewButtons() {
  document.querySelectorAll('[data-review-app]').forEach((b) => b.addEventListener('click', () => openApplicationModal(b.getAttribute('data-review-app'))));
}

function openApplicationModal(appId) {
  const app = STATE.applications.find((a) => a.id === appId);
  if (!app) return;

  const renderModalBody = () => `
    <div class="app-detail">
      <div class="app-detail__head">
        <div><h3>${esc(app.fullName)}</h3><p>${esc(app.maritalStatus)} &middot; ${esc(app.age)} years old &middot; ${esc(app.nationality)}</p></div>
        ${Badge({ status: app.status })}
      </div>
      <div class="app-detail__contact"><span>${icon('mail')} ${esc(app.email)}</span><span>${icon('phone')} ${esc(app.phone)}</span></div>
      <dl class="profile-page__facts">
        <div><dt>Employment</dt><dd>${esc(app.employmentStatus)}</dd></div>
        <div><dt>Residence</dt><dd>${esc(app.residenceType)}</dd></div>
        <div><dt>Address</dt><dd>${esc(app.address)}</dd></div>
        <div><dt>Existing children</dt><dd>${esc(app.existingChildren)}</dd></div>
        <div><dt>Submitted</dt><dd>${esc(formatDate(app.submittedDate))}</dd></div>
        <div><dt>Last updated</dt><dd>${esc(formatDate(app.lastUpdated))}</dd></div>
      </dl>
      <h4 class="app-detail__sub">Reason for adoption</h4>
      <p class="app-detail__reason">${esc(app.reasonForAdoption)}</p>
      <h4 class="app-detail__sub">Update status</h4>
      <div class="app-detail__status-actions">
        ${Object.entries(STATUS_LABELS).map(([key, label]) => `
          <button class="app-detail__status-btn ${app.status === key ? 'app-detail__status-btn--active' : ''}" data-set-status="${key}">${esc(label)}</button>
        `).join('')}
      </div>
    </div>
  `;

  openModal(`Application ${app.id}`, renderModalBody(), { width: '620px' });
  wireModalStatusButtons();

  function wireModalStatusButtons() {
    document.querySelectorAll('[data-set-status]').forEach((btn) => {
      btn.addEventListener('click', () => {
        const newStatus = btn.getAttribute('data-set-status');
        app.status = newStatus;
        app.lastUpdated = new Date().toISOString().slice(0, 10);

        const subjectMap = { approved: 'Your application has been approved', rejected: 'Update on your application', under_review: 'Your application is under review', pending: 'Your application status has changed' };
        const bodyMap = {
          approved: `Dear ${app.fullName.split(' ')[0]}, congratulations — your application (${app.id}) has been approved.`,
          rejected: `Dear ${app.fullName.split(' ')[0]}, after careful review, we are unable to approve application ${app.id} at this time.`,
          under_review: `Dear ${app.fullName.split(' ')[0]}, your application (${app.id}) is now under review.`,
          pending: `Dear ${app.fullName.split(' ')[0]}, your application (${app.id}) status has been updated.`,
        };
        STATE.notifications.unshift({
          id: `N-${STATE._notifSeq++}`,
          channel: 'email',
          to: app.email,
          subject: subjectMap[newStatus],
          body: bodyMap[newStatus],
          relatedTo: app.id,
          sentDate: new Date().toISOString(),
        });

        showToast(`Status updated to "${STATUS_LABELS[newStatus]}" — notification sent`);
        document.querySelector('.modal-panel__body').innerHTML = renderModalBody();
        wireModalStatusButtons();
        renderAdminApplicationsListOnly();
      });
    });
  }
}

function wireAdminApplicationsEvents() {
  const searchInput = document.getElementById('admin-apps-search');
  const statusSelect = document.getElementById('admin-apps-status');
  statusSelect.value = _adminAppsFilter.status;

  searchInput.addEventListener('input', (e) => { _adminAppsFilter.search = e.target.value; renderAdminApplicationsListOnly(); });
  statusSelect.addEventListener('change', (e) => { _adminAppsFilter.status = e.target.value; renderAdminApplicationsListOnly(); });

  wireAdminAppsReviewButtons();
}


// ============ page-admin-medical.js ============
// ============================================================
// ADMIN PAGE: MEDICAL MODULE
// ============================================================

const TYPE_LABELS = {
  diagnosis: { label: 'Diagnosis', tone: 'danger' },
  prescription: { label: 'Prescription', tone: 'info' },
  checkup: { label: 'Checkup', tone: 'success' },
  upcoming: { label: 'Upcoming', tone: 'warning' },
};

let _selectedMedicalChildId = null;

function renderAdminMedicalContent() {
  const childrenWithRecords = STATE.children.filter((c) => STATE.medical[c.id] && !c.archived);
  if (!_selectedMedicalChildId && childrenWithRecords.length > 0) {
    _selectedMedicalChildId = childrenWithRecords[0].id;
  }

  return `
    <div class="admin-medical">
      <div class="admin-page-head"><div><span class="section-eyebrow">Medical module</span><h1 class="admin-page-title">Medical records</h1></div></div>
      <div class="admin-medical__layout">
        ${Card(`
          <div class="admin-search admin-medical__search">${icon('search')}<input id="admin-medical-search" placeholder="Search children…" /></div>
          <div class="admin-medical__list" id="admin-medical-list">${medicalListHTML(childrenWithRecords, '')}</div>
        `, { className: 'admin-medical__sidebar', padded: false })}
        <div class="admin-medical__detail" id="admin-medical-detail">${medicalDetailHTML(_selectedMedicalChildId)}</div>
      </div>
    </div>
  `;
}

function medicalListHTML(children, search) {
  const filtered = children.filter((c) => `${c.firstName} ${c.lastName}`.toLowerCase().includes(search.toLowerCase()));
  if (filtered.length === 0) return `<div class="admin-medical__empty-list">No matches</div>`;
  return filtered.map((c) => `
    <button class="admin-medical__list-item ${_selectedMedicalChildId === c.id ? 'admin-medical__list-item--active' : ''}" data-select-medical-child="${esc(c.id)}">
      <img src="${esc(c.photo)}" alt="" />
      <div><strong>${esc(c.firstName)} ${esc(c.lastName)}</strong><span>${esc(STATE.medical[c.id].conditions.join(', ') || 'No active conditions')}</span></div>
    </button>
  `).join('');
}

function medicalDetailHTML(childId) {
  const child = childId ? findChild(childId) : null;
  const record = child ? STATE.medical[child.id] : null;
  if (!record) {
    return Card(EmptyState({ icon: 'document', title: 'No medical records', description: 'Children with medical notes will appear in the list.' }));
  }

  const medsHTML = record.medications.length > 0 ? `
    <div class="admin-medical__meds">
      <h4>Current medications</h4>
      <div class="admin-medical__meds-grid">
        ${record.medications.map((m) => `<div class="admin-medical__med-pill"><strong>${esc(m.name)}</strong><span>${esc(m.dosage)} &middot; ${esc(m.frequency)}</span></div>`).join('')}
      </div>
    </div>
  ` : '';

  const timelineHTML = record.timeline.map((entry, i) => `
    <div class="medical-timeline__item">
      <div class="medical-timeline__rail">
        <span class="medical-timeline__dot medical-timeline__dot--${TYPE_LABELS[entry.type]?.tone}"></span>
        ${i < record.timeline.length - 1 ? '<span class="medical-timeline__line"></span>' : ''}
      </div>
      <div class="medical-timeline__content">
        <div class="medical-timeline__meta">${Badge({ tone: TYPE_LABELS[entry.type]?.tone, label: TYPE_LABELS[entry.type]?.label })}<span>${esc(formatDate(entry.date))}</span></div>
        <h4>${esc(entry.title)}</h4>
        <p>${esc(entry.detail)}</p>
      </div>
    </div>
  `).join('');

  return `
    ${Card(`
      <div class="admin-medical__overview-head">
        <img src="${esc(child.photo)}" alt="" />
        <div><h2>${esc(child.firstName)} ${esc(child.lastName)}</h2><p>${esc(child.id)}</p></div>
      </div>
      <div class="admin-medical__overview-grid">
        <div><h4>Conditions</h4><p>${esc(record.conditions.join(', ') || 'None recorded')}</p></div>
        <div><h4>Allergies</h4><p>${esc(record.allergies.join(', ') || 'None recorded')}</p></div>
        <div><h4>Chronic diseases</h4><p>${esc(record.chronicDiseases.join(', ') || 'None recorded')}</p></div>
        <div><h4>Next appointment</h4><p class="admin-medical__next-appt">${icon('calendar')} ${esc(formatDate(record.nextAppointment))}</p></div>
      </div>
      ${medsHTML}
    `, { className: 'admin-medical__overview' })}
    ${Card(`
      <div class="admin-medical__timeline-head">${icon('stethoscope')}<h3>Medical timeline</h3></div>
      <div class="medical-timeline">${timelineHTML}</div>
    `)}
  `;
}

function wireAdminMedicalEvents() {
  const childrenWithRecords = STATE.children.filter((c) => STATE.medical[c.id] && !c.archived);
  const searchInput = document.getElementById('admin-medical-search');

  function refreshList() {
    document.getElementById('admin-medical-list').innerHTML = medicalListHTML(childrenWithRecords, searchInput.value);
    wireListButtons();
  }
  function wireListButtons() {
    document.querySelectorAll('[data-select-medical-child]').forEach((b) => b.addEventListener('click', () => {
      _selectedMedicalChildId = b.getAttribute('data-select-medical-child');
      document.getElementById('admin-medical-detail').innerHTML = medicalDetailHTML(_selectedMedicalChildId);
      refreshList();
    }));
  }

  searchInput.addEventListener('input', refreshList);
  wireListButtons();
}


// ============ page-admin-settings.js ============
// ============================================================
// ADMIN PAGE: SETTINGS — dynamic custom field builder
// ============================================================

function renderAdminSettingsContent() {
  const listHTML = STATE.customFields.length === 0
    ? Card(EmptyState({
        icon: 'nest',
        title: 'No custom fields yet',
        description: 'Add your first custom field to start capturing information specific to your organization.',
        actionHTML: `<button class="btn btn--primary" id="settings-empty-add-btn">${icon('plus')}<span>Add field</span></button>`,
      }))
    : `<div class="field-list" id="field-list">${STATE.customFields.map(fieldRowHTML).join('')}</div>`;

  return `
    <div class="admin-settings">
      <div class="admin-page-head">
        <div>
          <span class="section-eyebrow">Settings</span>
          <h1 class="admin-page-title">Custom fields</h1>
          <p class="admin-settings__intro">Define additional fields your orphanage needs to track — like tribe, religion, or blood group. New fields automatically appear when adding or editing any child record.</p>
        </div>
        <button class="btn btn--primary" id="settings-add-btn">${icon('plus')}<span>Add field</span></button>
      </div>
      <div id="field-list-wrapper">${listHTML}</div>
    </div>
  `;
}

function fieldRowHTML(field) {
  return Card(`
    <div class="field-row__icon">${icon('layers')}</div>
    <div class="field-row__info">
      <div class="field-row__top">
        <strong>${esc(field.label)}</strong>
        <span class="field-row__type">${esc(FIELD_TYPES.find((t) => t.value === field.type)?.label || field.type)}</span>
        ${field.required ? '<span class="field-row__required">Required</span>' : ''}
      </div>
      ${field.type === 'select' && field.options.length > 0 ? `<p class="field-row__options">${esc(field.options.join(' · '))}</p>` : ''}
      ${field.helpText ? `<p class="field-row__help">${esc(field.helpText)}</p>` : ''}
    </div>
    <div class="field-row__actions">
      <button class="btn btn--secondary btn--sm" data-edit-field="${esc(field.id)}">${icon('edit')}<span>Edit</span></button>
      <button class="btn btn--danger btn--sm" data-delete-field="${esc(field.id)}">${icon('trash')}<span>Delete</span></button>
    </div>
  `, { className: 'field-row' });
}

function refreshFieldList() {
  const wrapper = document.getElementById('field-list-wrapper');
  if (!wrapper) return;
  wrapper.innerHTML = STATE.customFields.length === 0
    ? Card(EmptyState({
        icon: 'nest',
        title: 'No custom fields yet',
        description: 'Add your first custom field to start capturing information specific to your organization.',
        actionHTML: `<button class="btn btn--primary" id="settings-empty-add-btn">${icon('plus')}<span>Add field</span></button>`,
      }))
    : `<div class="field-list" id="field-list">${STATE.customFields.map(fieldRowHTML).join('')}</div>`;
  wireFieldRowButtons();
  const emptyAddBtn = document.getElementById('settings-empty-add-btn');
  if (emptyAddBtn) emptyAddBtn.addEventListener('click', () => openFieldModal(null));
}

function openFieldModal(fieldId) {
  const field = fieldId ? STATE.customFields.find((f) => f.id === fieldId) : null;
  const renderBody = (typeVal) => `
    <form id="field-form">
      <div class="form-field"><label class="form-field__label" for="field-label">Field label <span class="form-field__required">*</span></label><input class="form-input" id="field-label" required value="${esc(field?.label || '')}" placeholder="e.g. Tribe" /><span class="form-field__hint">Shown to admins when creating or editing a child record.</span></div>
      <div class="form-field"><label class="form-field__label" for="field-type">Field type <span class="form-field__required">*</span></label>
        <select class="form-input form-select" id="field-type">
          ${FIELD_TYPES.map((t) => `<option value="${t.value}" ${(typeVal || field?.type) === t.value ? 'selected' : ''}>${esc(t.label)}</option>`).join('')}
        </select>
      </div>
      <div id="field-options-wrapper">
        ${(typeVal || field?.type) === 'select' ? `
          <div class="form-field"><label class="form-field__label" for="field-options">Options <span class="form-field__required">*</span></label><textarea class="form-input form-textarea" id="field-options" rows="2" required placeholder="Catholic, Protestant, Muslim, Other">${esc((field?.options || []).join(', '))}</textarea><span class="form-field__hint">Comma-separated list of choices.</span></div>
        ` : ''}
      </div>
      <div class="form-field"><label class="form-field__label" for="field-help">Help text</label><input class="form-input" id="field-help" value="${esc(field?.helpText || '')}" /><span class="form-field__hint">Optional context shown beneath the field.</span></div>
      <label class="field-row__checkbox"><input type="checkbox" id="field-required" ${field?.required ? 'checked' : ''} /> Make this field required</label>
      <div class="admin-modal-actions">
        <button type="button" class="btn btn--secondary" id="field-form-cancel"><span>Cancel</span></button>
        <button type="submit" class="btn btn--primary"><span>${field ? 'Save changes' : 'Add field'}</span></button>
      </div>
    </form>
  `;

  openModal(field ? 'Edit field' : 'Add a custom field', renderBody(), { width: '520px' });
  wireFieldFormEvents();

  function wireFieldFormEvents() {
    document.getElementById('field-form-cancel').addEventListener('click', closeModal);
    document.getElementById('field-type').addEventListener('change', (e) => {
      document.querySelector('.modal-panel__body').innerHTML = renderBody(e.target.value);
      wireFieldFormEvents();
    });
    document.getElementById('field-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const label = document.getElementById('field-label').value;
      const type = document.getElementById('field-type').value;
      const helpText = document.getElementById('field-help').value;
      const required = document.getElementById('field-required').checked;
      const optionsEl = document.getElementById('field-options');
      const options = type === 'select' && optionsEl ? optionsEl.value.split(',').map((s) => s.trim()).filter(Boolean) : [];

      if (field) {
        Object.assign(field, { label, type, helpText, required, options });
        showToast('Field updated');
      } else {
        const id = `cf_custom_${STATE._fieldSeq++}`;
        STATE.customFields.push({ id, label, type, helpText, required, options });
        showToast('Field added');
      }
      closeModal();
      refreshFieldList();
    });
  }
}

function openDeleteFieldConfirm(fieldId) {
  const field = STATE.customFields.find((f) => f.id === fieldId);
  if (!field) return;
  openModal('Delete custom field?', `
    <div class="field-delete-confirm">
      <p>Are you sure you want to delete <strong>${esc(field.label)}</strong>? This will remove it from all child forms. Existing values stored on child records will no longer be shown.</p>
      <div class="admin-modal-actions">
        <button class="btn btn--secondary" id="field-delete-cancel"><span>Cancel</span></button>
        <button class="btn btn--danger" id="field-delete-confirm"><span>Delete field</span></button>
      </div>
    </div>
  `, { width: '440px' });
  document.getElementById('field-delete-cancel').addEventListener('click', closeModal);
  document.getElementById('field-delete-confirm').addEventListener('click', () => {
    STATE.customFields = STATE.customFields.filter((f) => f.id !== fieldId);
    showToast('Field deleted');
    closeModal();
    refreshFieldList();
  });
}

function wireFieldRowButtons() {
  document.querySelectorAll('[data-edit-field]').forEach((b) => b.addEventListener('click', () => openFieldModal(b.getAttribute('data-edit-field'))));
  document.querySelectorAll('[data-delete-field]').forEach((b) => b.addEventListener('click', () => openDeleteFieldConfirm(b.getAttribute('data-delete-field'))));
}

function wireAdminSettingsEvents() {
  const addBtn = document.getElementById('settings-add-btn');
  if (addBtn) addBtn.addEventListener('click', () => openFieldModal(null));
  const emptyAddBtn = document.getElementById('settings-empty-add-btn');
  if (emptyAddBtn) emptyAddBtn.addEventListener('click', () => openFieldModal(null));
  wireFieldRowButtons();
}


// ============ router.js ============
// ============================================================
// ROUTER + MAIN RENDER DISPATCH
// ============================================================

function render() {
  const { path, query } = parseHash();
  const root = document.getElementById('app-root');

  // ---- Admin routes ----
  if (path.startsWith('/admin')) {
    if (path === '/admin/login') {
      root.innerHTML = renderAdminLogin();
      wireAdminLoginEvents();
      window.scrollTo(0, 0);
      return;
    }
    // Guard: any other /admin/* route requires an admin session
    if (!STATE.adminSession) {
      navigate('/admin/login');
      return;
    }
    let content = '';
    let wireFn = null;
    switch (path) {
      case '/admin/dashboard':
        content = renderAdminDashboardContent();
        break;
      case '/admin/children':
        content = renderAdminChildrenContent();
        wireFn = wireAdminChildrenEvents;
        break;
      case '/admin/applications':
        content = renderAdminApplicationsContent();
        wireFn = wireAdminApplicationsEvents;
        break;
      case '/admin/medical':
        content = renderAdminMedicalContent();
        wireFn = wireAdminMedicalEvents;
        break;
      case '/admin/settings':
        content = renderAdminSettingsContent();
        wireFn = wireAdminSettingsEvents;
        break;
      default:
        navigate('/admin/dashboard');
        return;
    }
    root.innerHTML = AdminShell(path, content);
    wireAdminShellEvents();
    if (wireFn) wireFn();
    window.scrollTo(0, 0);
    return;
  }

  // ---- Public routes ----
  let pageHTML = '';
  let wireFn = null;

  switch (path) {
    case '/':
      pageHTML = renderHome();
      wireFn = wireHomeEvents;
      break;
    case '/about':
      pageHTML = renderAbout();
      break;
    case '/children':
      pageHTML = renderChildListing();
      wireFn = wireChildListingEvents;
      break;
    case '/apply':
      pageHTML = renderApplicationForm();
      wireFn = wireApplicationFormEvents;
      break;
    case '/login':
      pageHTML = renderParentLogin(query);
      wireFn = () => wireParentLoginEvents(query);
      break;
    case '/dashboard':
      pageHTML = renderParentDashboard();
      wireFn = wireParentDashboardEvents;
      break;
    default:
      if (path.startsWith('/child/')) {
        const id = path.split('/child/')[1];
        pageHTML = renderChildProfile(id);
        break;
      }
      // fallback to home for unknown routes
      navigate('/');
      return;
  }

  // If a render function returned '' it means it already triggered a
  // navigate() redirect (e.g. dashboard/profile guards) — don't paint stale content.
  if (pageHTML === '') return;

  root.innerHTML = `${PublicNavbar(path)}<main>${pageHTML}</main>${PublicFooter()}`;
  wireNavbarEvents();
  if (wireFn) wireFn();
  window.scrollTo(0, 0);
}

// Intercept clicks on [data-route-link] elements so they always go through
// our render() pipeline immediately (hashchange also triggers it, this just
// avoids any flash/delay and keeps behavior consistent).
document.addEventListener('click', (e) => {
  const link = e.target.closest('[data-route-link]');
  if (link) {
    // let the default hash navigation happen; hashchange listener re-renders.
    // (no preventDefault needed since we want the URL hash to update normally)
  }
});

window.addEventListener('hashchange', render);
window.addEventListener('DOMContentLoaded', render);

</script>
</body>
</html>
